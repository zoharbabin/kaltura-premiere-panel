name: Release

# Trigger on version tags: push a tag like v1.0.0 to create a release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Run the full CI pipeline before releasing
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      - run: npm run package -- --validate-only
      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # Build .ccx packages and create GitHub Release
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Build .ccx package
        run: node scripts/build-ccx.js --output-dir release

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          cat > release/RELEASE_NOTES.md <<EOF
          ## How to Install

          1. Download \`kaltura-panel-${VERSION}.ccx\` from the **Assets** section below
          2. **Double-click** the \`.ccx\` file to install
          3. Open your Adobe app and go to **Window > UXP Plugins > Kaltura**

          Works with **Premiere Pro**, **After Effects**, and **Audition** (v25.2+).

          ### Requirements
          - A [Kaltura](https://corp.kaltura.com/) account with API access

          ### Enterprise / IT deployment
          See the [Enterprise Deployment Guide](https://github.com/${REPO}/blob/main/docs/enterprise-deployment.md).

          ---
          EOF

          # Strip leading whitespace from heredoc (YAML run block indentation)
          sed -i 's/^          //' release/RELEASE_NOTES.md

          # Append CHANGELOG entries for this version if available
          if [ -f CHANGELOG.md ]; then
            echo "### Changelog" >> release/RELEASE_NOTES.md
            echo "" >> release/RELEASE_NOTES.md
            awk '/^## '"${VERSION}"'/{found=1; next} /^## [0-9]/{found=0} found' CHANGELOG.md >> release/RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Kaltura for Adobe Creative Cloud v${{ steps.version.outputs.version }}"
          body_path: release/RELEASE_NOTES.md
          files: |
            release/*.ccx
          fail_on_unmatched_files: true
