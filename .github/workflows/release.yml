name: Release

# Trigger on version tags: push a tag like v1.0.0 to create a release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Run the full CI pipeline before releasing
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      - run: npm run package -- --validate-only
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Build .ccx packages and create GitHub Release
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Build .ccx packages
        run: node scripts/build-ccx.js --output-dir release

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > release/RELEASE_NOTES.md <<EOF
          ## Install the Plugin

          ### Premiere Pro users
          1. Download **\`kaltura-panel-${VERSION}-premierepro.ccx\`** below
          2. Double-click the downloaded file
          3. Creative Cloud Desktop will open — click **Install**
          4. Open Premiere Pro → **Window → UXP Plugins → Kaltura**

          ### After Effects users
          Download \`kaltura-panel-${VERSION}-aftereffects.ccx\` and follow the same steps.

          ### Audition users
          Download \`kaltura-panel-${VERSION}-audition.ccx\` and follow the same steps.

          ### Requirements
          - Adobe Premiere Pro, After Effects, or Audition **v25.2+**
          - A [Kaltura](https://corp.kaltura.com/) account with API access

          ### Enterprise / IT deployment
          Use the UPIA command-line tool to deploy silently:
          \`\`\`
          UnifiedPluginInstallerAgent --install kaltura-panel-${VERSION}-premierepro.ccx
          \`\`\`
          Or deploy via **Adobe Admin Console** managed packages. See the [Enterprise Deployment Guide](https://github.com/${{ github.repository }}/blob/main/docs/enterprise-deployment.md).

          ---
          EOF

          # Strip leading whitespace from heredoc (YAML run block indentation)
          sed -i 's/^          //' release/RELEASE_NOTES.md

          # Append CHANGELOG entries for this version if available
          if [ -f CHANGELOG.md ]; then
            echo "### Changelog" >> release/RELEASE_NOTES.md
            echo "" >> release/RELEASE_NOTES.md
            # Extract section between this version header and the next version header
            awk '/^## '"${VERSION}"'/{found=1; next} /^## [0-9]/{found=0} found' CHANGELOG.md >> release/RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Kaltura for Adobe Creative Cloud v${{ steps.version.outputs.version }}"
          body_path: release/RELEASE_NOTES.md
          files: release/*.ccx
          fail_on_unmatched_files: true
