name: Release

# Trigger on version tags: push a tag like v1.0.0 to create a release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Run the full CI pipeline before releasing
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      - run: npm run package -- --validate-only
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Build .ccx packages and create GitHub Release
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Build .ccx packages
        run: node scripts/build-ccx.js --output-dir release

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          cat > release/RELEASE_NOTES.md <<'HEADER'
          ## How to Install

          HEADER
          cat >> release/RELEASE_NOTES.md <<EOF
          ### Option A — One-Click Install (recommended)

          Requires [GitHub CLI](https://cli.github.com/) (\`gh\`). Open Terminal (macOS) or PowerShell (Windows) and paste:

          **macOS:**
          \`\`\`bash
          gh release download --clobber --repo ${REPO} --pattern 'quick-install.sh' --dir /tmp && bash /tmp/quick-install.sh
          \`\`\`

          **Windows (PowerShell as Administrator):**
          \`\`\`powershell
          gh release download --clobber --repo ${REPO} --pattern 'quick-install.ps1' --dir \$env:TEMP; & "\$env:TEMP\\quick-install.ps1"
          \`\`\`

          > To install for After Effects or Audition instead of Premiere Pro, set \`KALTURA_HOST_APP\` first:
          > \`\`\`bash
          > export KALTURA_HOST_APP=aftereffects
          > gh release download --clobber --repo ${REPO} --pattern 'quick-install.sh' --dir /tmp && bash /tmp/quick-install.sh
          > \`\`\`

          ### Option B — Manual Download
          1. Download **\`install-mac.sh\`** (macOS) or **\`install-win.bat\`** (Windows) below
          2. Download the \`.ccx\` file for your app (e.g. \`kaltura-panel-${VERSION}-premierepro.ccx\`)
          3. Place both files in the same folder
          4. **macOS:** Open Terminal, run \`chmod +x install-mac.sh && ./install-mac.sh\`
             **Windows:** Double-click \`install-win.bat\`
          5. Open your Adobe app and go to **Window > UXP Plugins > Kaltura**

          ### Option C — UPIA Command Line
          \`\`\`bash
          # macOS
          cd "/Library/Application Support/Adobe/Adobe Desktop Common/RemoteComponents/UPI/UnifiedPluginInstallerAgent/UnifiedPluginInstallerAgent.app/Contents/MacOS"
          ./UnifiedPluginInstallerAgent --install /path/to/kaltura-panel-${VERSION}-premierepro.ccx

          # Windows
          cd "C:\\Program Files\\Common Files\\Adobe\\Adobe Desktop Common\\RemoteComponents\\UPI\\UnifiedPluginInstallerAgent"
          UnifiedPluginInstallerAgent.exe /install C:\\path\\to\\kaltura-panel-${VERSION}-premierepro.ccx
          \`\`\`

          ### Option D — UXP Developer Tool (development)
          1. Install the [UXP Developer Tool](https://developer.adobe.com/premiere-pro/uxp/devtools/)
          2. Download and unzip the \`.ccx\` file (it's a ZIP archive)
          3. Open UXP Developer Tool > **Add Plugin** > select the \`manifest.json\`
          4. Click **Load** to sideload the plugin

          ### Available Downloads
          | File | Host App |
          |------|----------|
          | \`kaltura-panel-${VERSION}-premierepro.ccx\` | Premiere Pro |
          | \`kaltura-panel-${VERSION}-aftereffects.ccx\` | After Effects |
          | \`kaltura-panel-${VERSION}-audition.ccx\` | Audition |
          | \`install-mac.sh\` | macOS installer script |
          | \`install-win.bat\` | Windows installer script |

          ### Requirements
          - Adobe Premiere Pro, After Effects, or Audition **v25.2+**
          - Creative Cloud Desktop (for UPIA installer)
          - A [Kaltura](https://corp.kaltura.com/) account with API access

          > **Note:** The \`.ccx\` double-click install only works for Photoshop plugins.
          > For Premiere Pro, After Effects, and Audition, use the installer script or UPIA command above.

          ### Enterprise / IT deployment
          See the [Enterprise Deployment Guide](https://github.com/${REPO}/blob/main/docs/enterprise-deployment.md).

          ---
          EOF

          # Strip leading whitespace from heredoc (YAML run block indentation)
          sed -i 's/^          //' release/RELEASE_NOTES.md

          # Append CHANGELOG entries for this version if available
          if [ -f CHANGELOG.md ]; then
            echo "### Changelog" >> release/RELEASE_NOTES.md
            echo "" >> release/RELEASE_NOTES.md
            awk '/^## '"${VERSION}"'/{found=1; next} /^## [0-9]/{found=0} found' CHANGELOG.md >> release/RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Kaltura for Adobe Creative Cloud v${{ steps.version.outputs.version }}"
          body_path: release/RELEASE_NOTES.md
          files: |
            release/*.ccx
            release/install-mac.sh
            release/install-win.bat
            release/quick-install.sh
            release/quick-install.ps1
          fail_on_unmatched_files: true
